<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Background Page</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    .content {
      text-align: center;
      background: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 15px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    p {
      font-size: 1.2em;
    }
  </style>

</head>

<body>
  <div class="content">
    <h1>Hello World</h1>
    <p>This is your first clean background page.</p>
  </div>
</body>
</html>
