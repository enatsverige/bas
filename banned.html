
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konto förbjudet</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: #1f2937;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.container{
    text-align:center;
    background:rgba(0,0,0,0.55);
    padding:50px;
    border-radius:12px;
    max-width:500px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
    font-size:42px;
    margin-bottom:10px;
    color:#ff4d4d;
}

p{
    font-size:18px;
    line-height:1.6;
}

.email{
    margin-top:20px;
    font-size:18px;
    background:#ff4d4d;
    padding:12px 20px;
    border-radius:6px;
    display:inline-block;
}

.email a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}
</style>

</head>

<body>

<div class="container">
    
    <div class="icon">🚫</div>
    
    <h1>Kontot är avstängt</h1>
    
    <p>
        Ditt konto har suspenderats på grund av brott mot våra community-regler.
        Om du anser att detta är ett misstag, vänligen kontakta plattformens grundare.
    </p>

    <div class="email">
        Kontakt: <a href="mailto:enatsverige@yahoo.com">enatsverige@yahoo.com</a>
    </div>

</div>

</body>
</html>
