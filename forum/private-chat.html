<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privat Krypterad Chatt</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <style>
    :root {
      --bg: #0a1d37;
      --panel: #11294a;
      --panel-2: #0e2442;
      --text: #e0e0ff;
      --muted: #a0c0ff;
      --gold: #ffd700;
      --orange: #ff8c00;
      --border: #3a5a8f;
      --ok: #4caf50;
      --error: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #06152b, #0a1d37);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.18);
    }

    .header h1, .header h2 {
      margin: 0;
      font-size: 20px;
      color: var(--gold);
    }

    .panel-body { padding: 16px; }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 6px;
    }

    input, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    input:focus, textarea:focus {
      outline: 2px solid rgba(255, 215, 0, 0.28);
      border-color: var(--gold);
    }

    button {
      background: var(--orange);
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.05); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .stack { display: grid; gap: 12px; }

    .small {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--error); }

    .user-list {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      max-height: 220px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .user-chip {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.14);
      font-size: 13px;
      cursor: pointer;
    }

    .chat-area {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 78vh;
    }

    .meta-line {
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
    }

    .messages {
      padding: 16px;
      overflow: auto;
      display: grid;
      gap: 10px;
      align-content: start;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), transparent);
    }

    .msg {
      max-width: 75%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #11325c;
    }

    .msg.mine {
      justify-self: end;
      background: #23406a;
      border-color: #547fb6;
    }

    .msg-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
      background: rgba(0, 0, 0, 0.14);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 30px;
    }

    @media (max-width: 960px) {
      .wrap { grid-template-columns: 1fr; }
      .chat-area { min-height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="header">
        <h1>Privat krypterad chatt</h1>
      </div>
      <div class="panel-body stack">
        <div>
          <label for="recipient">Mottagarens användarnamn</label>
          <input id="recipient" placeholder="t.ex. anna" autocomplete="off" />
        </div>

        <div>
          <label for="sharedSecret">Delad hemlig kod (lösenfras)</label>
          <input id="sharedSecret" type="password" placeholder="Samma kod hos båda" autocomplete="off" />
          <div class="small">Meddelanden krypteras i din webbläsare innan de sparas i Supabase.</div>
        </div>

        <button id="startBtn">Starta / uppdatera konversation</button>
        <button id="refreshBtn" type="button">Uppdatera meddelanden</button>

        <div id="status" class="status"></div>

        <div class="small">
          Inloggad användare: <strong id="currentUserLabel">Laddar...</strong>
        </div>

        <div class="user-list" id="userList"></div>
      </div>
    </section>

    <section class="card chat-area">
      <div class="header">
        <h2 id="chatTitle">Ingen konversation vald</h2>
        <div id="chatMeta" class="meta-line">Välj mottagare och hemlig kod för att läsa/skicka.</div>
      </div>

      <div id="messages" class="messages">
        <div class="empty">Inga meddelanden ännu.</div>
      </div>

      <form id="composerForm" class="composer">
        <textarea id="messageInput" placeholder="Skriv krypterat meddelande..." required></textarea>
        <button id="sendBtn" type="submit">Skicka</button>
      </form>
    </section>
  </div>

  <script>
    const supabase = window.supabaseClient;

    const state = {
      currentUser: null,
      recipientId: null,
      recipientUsername: "",
      secret: "",
      pollTimer: null,
    };

    const recipientInput = document.getElementById("recipient");
    const sharedSecretInput = document.getElementById("sharedSecret");
    const startBtn = document.getElementById("startBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusEl = document.getElementById("status");
    const currentUserLabel = document.getElementById("currentUserLabel");
    const chatTitle = document.getElementById("chatTitle");
    const chatMeta = document.getElementById("chatMeta");
    const messagesEl = document.getElementById("messages");
    const userListEl = document.getElementById("userList");
    const composerForm = document.getElementById("composerForm");
    const messageInput = document.getElementById("messageInput");

    function setStatus(text, type = "ok") {
      statusEl.textContent = text;
      statusEl.className = `status ${type}`;
    }

    function toBase64(uint8Array) {
      let binary = "";
      for (let i = 0; i < uint8Array.length; i++) {
        binary += String.fromCharCode(uint8Array[i]);
      }
      return btoa(binary);
    }

    function fromBase64(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    async function deriveAesKey(secret, salt) {
      const encoder = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        encoder.encode(secret),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations: 200000,
          hash: "SHA-256",
        },
        keyMaterial,
        {
          name: "AES-GCM",
          length: 256,
        },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function encryptMessage(plainText, secret) {
      const encoder = new TextEncoder();
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveAesKey(secret, salt);
      const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        encoder.encode(plainText)
      );

      return {
        cipher_text: toBase64(new Uint8Array(encrypted)),
        iv: toBase64(iv),
        salt: toBase64(salt),
      };
    }

    async function decryptMessage(payload, secret) {
      const decoder = new TextDecoder();
      const salt = fromBase64(payload.salt);
      const iv = fromBase64(payload.iv);
      const cipherBytes = fromBase64(payload.cipher_text);
      const key = await deriveAesKey(secret, salt);
      const plainBuffer = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv },
        key,
        cipherBytes
      );
      return decoder.decode(plainBuffer);
    }

    async function getCurrentUser() {
      const { data, error } = await supabase.auth.getUser();
      if (error || !data?.user) {
        window.location.href = "./login-member.html";
        return null;
      }
      return data.user;
    }

    async function loadContacts() {
      const [{ data: members }, { data: enatists }] = await Promise.all([
        supabase.from("member_profiles").select("id, username").order("username", { ascending: true }),
        supabase.from("enatist_profiles").select("id, username").order("username", { ascending: true }),
      ]);

      const allUsers = [...(members || []), ...(enatists || [])]
        .filter((u) => u.id !== state.currentUser.id)
        .filter((u, index, arr) => index === arr.findIndex((x) => x.id === u.id))
        .slice(0, 80);

      userListEl.innerHTML = allUsers.length
        ? allUsers
            .map((u) => `<div class="user-chip" data-id="${u.id}" data-username="${u.username}">@${u.username}</div>`)
            .join("")
        : '<div class="small">Inga användare hittades.</div>';

      userListEl.querySelectorAll(".user-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          recipientInput.value = chip.dataset.username;
          state.recipientId = chip.dataset.id;
          state.recipientUsername = chip.dataset.username;
          setStatus(`Mottagare vald: @${state.recipientUsername}`);
        });
      });
    }

    async function resolveRecipientByUsername(username) {
      if (!username) return null;
      const uname = username.trim();
      let result = await supabase
        .from("member_profiles")
        .select("id, username")
        .eq("username", uname)
        .maybeSingle();

      if (!result.data) {
        result = await supabase
          .from("enatist_profiles")
          .select("id, username")
          .eq("username", uname)
          .maybeSingle();
      }
      return result.data || null;
    }

    function formatDate(isoDate) {
      const d = new Date(isoDate);
      return d.toLocaleString("sv-SE", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    async function loadMessages() {
      if (!state.currentUser || !state.recipientId || !state.secret) {
        return;
      }

      const { data, error } = await supabase
        .from("private_messages")
        .select("id, sender_id, recipient_id, cipher_text, iv, salt, created_at")
        .or(
          `and(sender_id.eq.${state.currentUser.id},recipient_id.eq.${state.recipientId}),and(sender_id.eq.${state.recipientId},recipient_id.eq.${state.currentUser.id})`
        )
        .order("created_at", { ascending: true })
        .limit(300);

      if (error) {
        setStatus(`Kunde inte hämta meddelanden: ${error.message}`, "error");
        return;
      }

      if (!data || data.length === 0) {
        messagesEl.innerHTML = '<div class="empty">Inga meddelanden ännu.</div>';
        return;
      }

      const rendered = await Promise.all(
        data.map(async (msg) => {
          let plain = "[Kunde inte dekryptera – fel kod eller skadat meddelande]";
          try {
            plain = await decryptMessage(msg, state.secret);
          } catch (_e) {
            // ignore and show fallback text
          }

          const mine = msg.sender_id === state.currentUser.id;
          return `
            <div class="msg ${mine ? "mine" : ""}">
              <div>${plain.replace(/</g, "&lt;")}</div>
              <div class="msg-meta">${mine ? "Du" : `@${state.recipientUsername}`} • ${formatDate(msg.created_at)}</div>
            </div>
          `;
        })
      );

      messagesEl.innerHTML = rendered.join("");
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function startConversation() {
      const recipientUsername = recipientInput.value.trim();
      const secret = sharedSecretInput.value;

      if (!recipientUsername) {
        setStatus("Skriv mottagarens användarnamn.", "error");
        return;
      }
      if (!secret || secret.length < 6) {
        setStatus("Ange en hemlig kod med minst 6 tecken.", "error");
        return;
      }

      let recipient = null;
      if (state.recipientUsername === recipientUsername && state.recipientId) {
        recipient = { id: state.recipientId, username: state.recipientUsername };
      } else {
        recipient = await resolveRecipientByUsername(recipientUsername);
      }

      if (!recipient) {
        setStatus("Kunde inte hitta användaren. Kontrollera användarnamn.", "error");
        return;
      }

      if (recipient.id === state.currentUser.id) {
        setStatus("Du kan inte skicka till dig själv.", "error");
        return;
      }

      state.recipientId = recipient.id;
      state.recipientUsername = recipient.username;
      state.secret = secret;

      chatTitle.textContent = `Chatt med @${recipient.username}`;
      chatMeta.textContent = "End-to-end-liknande kryptering i klienten (delad kod krävs för läsning).";

      await loadMessages();
      setStatus(`Konversation aktiv med @${recipient.username}.`, "ok");

      if (state.pollTimer) clearInterval(state.pollTimer);
      state.pollTimer = setInterval(loadMessages, 6000);
    }

    async function sendMessage(event) {
      event.preventDefault();

      const text = messageInput.value.trim();
      if (!text) return;

      if (!state.recipientId || !state.secret) {
        setStatus("Starta först en konversation med mottagare + kod.", "error");
        return;
      }

      const encrypted = await encryptMessage(text, state.secret);

      const { error } = await supabase.from("private_messages").insert({
        sender_id: state.currentUser.id,
        recipient_id: state.recipientId,
        cipher_text: encrypted.cipher_text,
        iv: encrypted.iv,
        salt: encrypted.salt,
      });

      if (error) {
        setStatus(`Kunde inte skicka: ${error.message}`, "error");
        return;
      }

      messageInput.value = "";
      await loadMessages();
    }

    async function init() {
      const user = await getCurrentUser();
      if (!user) return;

      state.currentUser = user;
      currentUserLabel.textContent = user.email || user.id;

      await loadContacts();
      setStatus("Redo. Välj mottagare och ange delad kod.");
    }

    startBtn.addEventListener("click", startConversation);
    refreshBtn.addEventListener("click", loadMessages);
    composerForm.addEventListener("submit", sendMessage);

    init();
  </script>
</body>
</html>
