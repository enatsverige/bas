<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ledarskapsinloggning</title>

    <link rel="stylesheet" href="../css/org-theme.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>

</head>

<body>
   <a href="./index.html" class="home-icon" title="Gå till startsidan">
    🏠
</a>

<div class="container">

    <h2>Inloggning för ledning</h2>

    <form id="loginForm">

        <input id="email" type="email" placeholder="E-post" required autocomplete="email">

        <input id="password" type="password" placeholder="Lösenord" required autocomplete="current-password">

        <button type="submit">Logga in</button>

    </form>

    <p class="leader-link-container">
        <a href="./leadership-register.html" class="leader-link">Har du inget konto? Registrera dig som ledning</a>
    </p>

</div>

    <script>

        document.getElementById("loginForm").addEventListener("submit", loginLeadership)

        async function loginLeadership(e) {

            e.preventDefault()

            const email = document.getElementById("email").value.trim()
            const password = document.getElementById("password").value.trim()

            const supabase = window.supabaseClient

            /* STEP 1 — LOGIN AUTH */

            const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            })

            if (authError) {

                alert("Ogiltig inloggning")
                return

            }

            /* STEP 2 — CHECK ORGANIZATION ROLE */

            const { data: userData, error: userError } = await supabase
                .from("organization_users")
                .select("*")
                .eq("id", authData.user.id)
                .single()

            if (userError || !userData) {

                alert("Åtkomst nekad")
                return

            }

            if (userData.role !== "leadership") {

                alert("Du är inte auktoriserad")
                return

            }

            /* STEP 3 — SAVE SESSION */

            sessionStorage.setItem("orgRole", userData.role)
            sessionStorage.setItem("orgUser", userData.username)
            sessionStorage.setItem("user_id", authData.user.id)

            /* STEP 4 — REDIRECT */

            location.href = "dashboard.html"

        }

    </script>

</body>

</html>
